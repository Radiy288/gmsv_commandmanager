name: gmsv_commandmanager CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:

# =========================
# WINDOWS x64
# =========================
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Download premake5
        run: |
          Invoke-WebRequest `
          https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip `
          -OutFile premake.zip
          Expand-Archive premake.zip -DestinationPath premake

      - name: Clone garrysmod_common
        run: git clone --recursive https://github.com/danielga/garrysmod_common.git

      - name: Generate project (x64)
        run: |
          .\premake\premake5.exe --gmcommon=.\garrysmod_common vs2022

      - name: Build x64
        run: |
          msbuild projects\windows\vs2022\commandmanager.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmsv_win64
          path: |
            **/*.dll


# =========================
# WINDOWS x86 (WIN32)
# =========================
  windows-x86:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Download premake5
        run: |
          Invoke-WebRequest `
          https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip `
          -OutFile premake.zip
          Expand-Archive premake.zip -DestinationPath premake

      - name: Clone garrysmod_common
        run: git clone --recursive https://github.com/danielga/garrysmod_common.git

      - name: Generate project (win32)
        run: |
          .\premake\premake5.exe --gmcommon=.\garrysmod_common vs2022

      - name: Build win32
        run: |
          msbuild projects\windows\vs2022\commandmanager.sln /p:Configuration=Release /p:Platform=Win32

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmsv_win32
          path: |
            **/*.dll


# =========================
# LINUX x64
# =========================
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget

      - name: Download premake5
        run: |
          wget https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz
          tar -xvf premake-5.0.0-beta8-linux.tar.gz
          chmod +x premake5

      - name: Clone garrysmod_common
        run: git clone --recursive https://github.com/danielga/garrysmod_common.git

      - name: Generate makefiles
        run: |
          ./premake5 --gmcommon=./garrysmod_common gmake2

      - name: Build linux
        run: |
          cd projects/linux/gmake
          make help
          make config=release_x86_64 -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmsv_linux
          path: |
            **/*.so
